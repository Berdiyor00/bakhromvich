version: "3.9"
services:
  server:
    build: ./server
    container_name: hotwalls_server
    environment:
      - PORT=5000
      - JWT_SECRET=change_me_super_secret
      - DATABASE_URL=file:/app/prisma/dev.db
      - CLIENT_URL=http://localhost:8080
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/prisma:/app/prisma
    ports:
      - "5000:5000"

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000
    container_name: hotwalls_client
    depends_on:
      - server
    ports:
      - "8080:80"
